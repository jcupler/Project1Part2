<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/navbar.css" rel="stylesheet">
    <link href="../css/about.css" rel="stylesheet">
    <link href="../css/product.css" rel="stylesheet">
</head>
<body>

<!-- Bootstrap container can accommodate 12 cols w/ unlimited # of rows -->
<div class="container-fluid">

    <!-- everything under div will be in 1 row -->
    <!-- g-# means spacing between rows & cols: 0 -> 5 smaller -> larger. same logic applies everything else (like mg-, p-)-->
    <!-- gx-#, gy-# would allow spacing for only row/col -->
    <div class="row g-2">

        <!--Small Screens: Take full width (col-12), larger only 3 columns wide -->
        <div class="col-12 col-lg-12">
            <!-- Navigation Bar -->
            <nav class="navbar navbar-expand-lg custom-navbar">
                <a class="navbar-brand" href="../html/index.html">YavML</a>

                <!-- Button to collapse/expand nav when screen small enough -->
                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#sideNav">
                    <i class="bi bi-chevron-right"></i>
                </button>

                <!-- Button set up for nav links -->
                <div class="collapse navbar-collapse flex-row align-items-center" id="sideNav">
                    <ul class="navbar-nav flex-row gap-4 text-center p-2">
                        <li class="nav-item">
                            <a class="btn btn-primary" href="../html/index.html" role="button">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary" href="../html/about.html" role="button">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary" href="../html/contact.html" role="button">Contact</a>
                        </li>
                    </ul>
                </div>
            </nav>


            <img src="../img/product1.jpg" class="img-fluid rounded mx-auto d-block" alt="Responsive image">
        </div>

        <!-- Content below navbar -->
        <div class="content-area col-12">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8 text-center">
                    <h1 class="mb-3"> Product Name</h1>
                    <h2 class="product-desc"> Description</h2>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
