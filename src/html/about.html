<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/navbar.css" rel="stylesheet">
    <link href="../css/about.css" rel="stylesheet">
</head>
<body>
<!-- Bootstrap container can accommodate 12 cols w/ unlimited # of rows -->
<!-- Bootstrap container can accommodate 12 cols w/ unlimited # of rows -->
<div class="container-fluid">

    <!-- everything under div will be in 1 row -->
    <!-- g-# means spacing between rows & cols: 0 -> 5 smaller -> larger. same logic applies everything else (like mg-, p-)-->
    <!-- gx-#, gy-# would allow spacing for only row/col -->
    <div class="row g-2">

        <!--Small Screens: Take full width (col-12), larger only 3 columns wide -->
        <div class="col-12 col-lg-3">
            <!-- Navigation Bar -->
            <nav class="navbar navbar-expand-lg custom-navbar">
                <a class="navbar-brand" href="../html/index.html">YavML</a>

                <!-- Button to collapse/expand nav when screen small enough -->
                <button class="navbar-toggler"
                        type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#sideNav">
                    <i class="bi bi-chevron-right"></i>
                </button>

                <!-- Button set up for nav links -->
                <div class="collapse navbar-collapse flex-column align-items-center" id="sideNav">
                    <ul class="navbar-nav flex-column gap-4 text-center p-2">
                        <li class="nav-item">
                            <a class="btn btn-primary" href="../html/index.html" role="button">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary" href="../html/about.html" role="button">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary" href="../html/contact.html" role="button">Contact</a>
                        </li>
                    </ul>
                </div>
            </nav>
        </div>

        <!-- Image Slideshow, Code based on docs: https://getbootstrap.com/docs/5.3/components/carousel/ -->
        <div class="col-12 col-lg-9">
            <!-- Images in here are set to be part of the slideshow -->
            <div id="bannerCarousel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="../img/banner.jpg" class="d-block w-100" alt="banner" data-bs-interval="5000">
                    </div>
                    <div class="carousel-item">
                        <img src="../img/banner1.jpg" class="d-block w-100" alt="banner1" data-bs-interval="5000">
                    </div>
                    <div class="carousel-item">
                        <img src="../img/banner2.jpg" class="d-block w-100" alt="banner2" data-bs-interval="5000">
                    </div>
                </div>

                <!-- Slideshow Prev/Next control buttons -->
                <button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                </button>
            </div>
        </div>

        <!-- Content below navbar -->
        <div class="content-area col-12">
            <h1> Yet Another Vision ML Company is a leading innovator in the field of computer vision and machine learning. </h1>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
